<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Play World - Teste Premium</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <style>
        /* Variáveis CSS: O design se adapta dinamicamente */
        :root {
            --cor-time: #7C3AED; 
            --bg-time: #0B0E14;
            --borda-time: rgba(124, 92, 237, 0.5);
        }

        body {
            background-color: var(--bg-time);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: all 0.5s ease;
        }

        .header { margin-bottom: 20px; text-align: center; }
        .header h1 { 
            color: var(--cor-time); 
            font-size: 26px; 
            margin: 0; 
            letter-spacing: 2px; 
            font-weight: bold;
            text-transform: uppercase;
        }
        .header p { color: #94A3B8; margin: 5px 0 0 0; font-size: 14px; }
        
        .player-container {
            width: 90%;
            max-width: 800px;
            border: 3px solid var(--cor-time);
            box-shadow: 0 0 25px var(--borda-time);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
        }

        .video-js { width: 100% !important; height: 450px !important; }

        .escudo-time {
            font-size: 55px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="escudo-time" id="escudo-player">⚽</div>

    <div class="header">
        <h1 id="titulo-time">ARENA PLAY • STREAMING</h1>
        <p>Aproveite o seu sinal de teste exclusivo internacional</p>
    </div>

    <div class="player-container">
        <video id="player-web" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <source src="https://SOUZASTVS.github.io/stream/sbt-sp" type="application/x-mpegURL">
        </video>
    </div>

    <script>
        // Lê o time passado pelo seu painel (Ex: ?time=benfica)
        const urlParams = new URLSearchParams(window.location.search);
        const timeEscolhido = (urlParams.get('time') || 'neutro').toLowerCase();

        const root = document.documentElement;
        const titulo = document.getElementById('titulo-time');
        const escudo = document.getElementById('escudo-player');

        // DICIONÁRIO DE SKINS MUNDIAIS (Fácil de atualizar!)
        const skins = {
            palmeiras: { cor: '#006437', bg: '#021E12', borda: 'rgba(0,100,55,0.7)', nome: 'Verdão Play', emoji: '🐷💚' },
            corinthians: { cor: '#FFFFFF', bg: '#111111', borda: 'rgba(255,255,255,0.4)', nome: 'Timão Play', emoji: '🦅🖤' },
            
            // 🇵🇹 PORTUGAL: BENFICA (Vermelho Encarnado e Branco)
            benfica: { cor: '#E30613', bg: '#1C0002', borda: 'rgba(227,6,19,0.7)', nome: 'Benfica Play VIP', emoji: '🦅🔴' },
            
            // 🇪🇸 ESPANHA: BARCELONA (Blaugrana - Azul e Grená)
            barcelona: { cor: '#EDBB00', bg: '#004D98', borda: 'rgba(165,0,68,0.8)', nome: 'Barça Stream Premium', emoji: '🔵🔴' },
            
            neutro: { cor: '#7C3AED', bg: '#0B0E14', borda: 'rgba(124,92,237,0.5)', nome: 'Arena Play World', emoji: '⚽' }
        };

        // Aplica a skin selecionada ou usa a neutra caso o time não exista na lista
        const skinAtiva = skins[timeEscolhido] || skins['neutro'];

        root.style.setProperty('--cor-time', skinAtiva.cor);
        root.style.setProperty('--bg-time', skinAtiva.bg);
        root.style.setProperty('--borda-time', skinAtiva.borda);
        titulo.innerText = skinAtiva.nome + " • AO VIVO";
        escudo.innerText = skinAtiva.emoji;

        // Inicializa o player
        var player = videojs('player-web', { autoplay: true, muted: false, fluid: true });
    </script>
</body>
</html>
