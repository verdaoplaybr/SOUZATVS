<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUZASTVS - Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        :root { --cor-time: #7C3AED; --bg-time: #0B0E14; }
        body { background-color: var(--bg-time); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { margin: 20px 0; text-align: center; }
        #titulo-time { color: var(--cor-time); font-size: 26px; }
        .player-container { width: 90%; max-width: 800px; border: 3px solid var(--cor-time); border-radius: 12px; overflow: hidden; background: #000; }
        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: #0B0E14; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: #1A1F2C; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0B0E14; border: 1px solid #2A3142; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #7C3AED; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>Acesso Premium</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">Acessar</button>
        </div>
    </div>
    <div class="header">
        <h1 id="titulo-time">ARENA PLAY • STREAMING</h1>
    </div>
    <div class="player-container">
        <video id="player-web" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let user = urlParams.get('user');
        let pass = urlParams.get('pass');
        let time = urlParams.get('time') || 'neutro';
        let canal = urlParams.get('canal') || 'sbt-sp';

        function aplicarSkin(tema) {
            const root = document.documentElement;
            const titulo = document.getElementById('titulo-time');
            if (tema === 'palmeiras') { root.style.setProperty('--cor-time', '#006437'); titulo.innerText = "VERDÃO PLAY"; }
            else if (tema === 'corinthians') { root.style.setProperty('--cor-time', '#FFFFFF'); titulo.innerText = "TIMÃO PLAY"; }
            else if (tema === 'benfica') { root.style.setProperty('--cor-time', '#FF0000'); titulo.innerText = "BENFICA PLAY"; }
            else if (tema === 'barcelona') { root.style.setProperty('--cor-time', '#A50044'); titulo.innerText = "BARÇA PLAY"; }
        }

        function iniciarPlayer(deviceId) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('titulo-time').innerText = "CARREGANDO...";
            
            // Aplica a skin selecionada
            aplicarSkin(time);

            videojs('player-web', {
                autoplay: true,
                sources: [{ src: `/stream/${canal}?deviceId=${deviceId}`, type: 'application/x-mpegURL' }]
            });
        }

        function fazerLogin() {
            // Mock de validação
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u && p) iniciarPlayer(u);
        }

        if (user && pass) {
            iniciarPlayer(user);
        }
    </script>
</body>
</html>
